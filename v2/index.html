<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Nethula Rankidu | Home</title>
</head>

<body>
    <div class="pfp-and-name">
        <img src="/assets/img/pfp.jpg" alt="Profile Picture" class="pfp">
        <div class="details">
            <h1>Hi, I'm Nethula Rankidu,</h1>
            <p>Welcome to my personal website.</p>
        </div>
    </div>
    <br>
    <table class="about-me">
        <tr>
            <th style="text-align: left;">About Me.</th>
        </tr>
        <tr>
            <td style="font-family: spectral;" id="about-me-p">

            </td>
        </tr>
    </table>
    <br>
    <div class="flex-wrap">
        <table class="my-skills">
            <tr>
                <th style="text-align: left;">My Skills.</th>
            </tr>
            <tr>
                <td style="font-family: spectral;">
                    <ul id="my-skills-list">

                    </ul>
                </td>
            </tr>
        </table>
        <table class="my-interests">
            <tr>
                <th style="text-align: left;">A bit more about me, I guess.</th>
            </tr>
            <tr>
                <td style="font-family: 'albert sans';">
                    <ul id="my-facts-list">

                    </ul>
                </td>
            </tr>
        </table>
        <table class="my-socials">
            <tr>
                <th style="text-align: left;">My Socials*.</th>
            </tr>
            <tr>
                <td style="font-family: monospace; font-size: 14px;">
                    <ul id="dynamic-socials">
                    </ul>
                </td>
            </tr>
        </table>
    </div>
    <br>
    <div class="flex-wrap">
        <table class="now-playing">
            <tr>
                <th style="text-align: left;" id="status-text">Now Playing</th>
            </tr>
            <tr>
                <td>
                    <div id="now-playing-container" style="display: flex; align-items: center; gap: 10px;">
                        <img src="/assets/icons/music.svg" alt="" id="cover-art" height="100">
                        <a href="" id="song-url">
                            <div class="details">
                                <p id="track-name">Song Name</p>
                                <p id="album-name" style="font-size: 15px;">Album Name</p>
                                <p id="artist-name" style="font-size: 14px;">Artist Name</p>
                            </div>
                        </a>
                    </div>
                </td>
            </tr>
        </table>
    </div>
    <p><i>
            * Most of the socials might still be private because of age constraints, but I will be making them public
            soon.
        </i></p>
</body>
<script src="script.js"></script>

</html>
