<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Redirecting...</title>
    <script>
        // Putting this at the very top of the head stops the page from drawing
        window.location.replace("/v2/");

    <meta http-equiv="refresh" content="0; url=/v2/">
</head>

    <p>If you are not redirected automatically, follow this <a href="/v2/">link to v2</a>.</p>
</body>
</html>
